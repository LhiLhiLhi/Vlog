<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Cassette body -->
  <rect x="6" y="14" width="52" height="36" rx="4" fill="#f4ebd8" stroke="#7a5c43" stroke-width="2"/>
  <rect x="10" y="18" width="44" height="20" rx="2" fill="#e3d1b8" stroke="#7a5c43" stroke-width="1.5"/>
  <!-- Tape reels -->
  <circle cx="22" cy="28" r="7" fill="#fffdf7" stroke="#7a5c43" stroke-width="1.5"/>
  <circle cx="22" cy="28" r="3" fill="#d4a373" stroke="#7a5c43" stroke-width="1"/>
  <circle cx="42" cy="28" r="7" fill="#fffdf7" stroke="#7a5c43" stroke-width="1.5"/>
  <circle cx="42" cy="28" r="3" fill="#d4a373" stroke="#7a5c43" stroke-width="1"/>
  <!-- Tape window -->
  <rect x="27" y="24" width="10" height="8" rx="1" fill="#3b2c20" opacity="0.3"/>
  <!-- Label strip -->
  <rect x="14" y="40" width="36" height="6" rx="1" fill="#e07a5f" opacity="0.6"/>
  <!-- Musical notes -->
  <text x="4" y="14" font-size="12" fill="#a44a3f" font-family="serif">♪</text>
  <text x="50" y="12" font-size="14" fill="#a44a3f" font-family="serif">♫</text>
  <text x="44" y="58" font-size="10" fill="#a44a3f" font-family="serif">♪</text>
</svg>
