<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Polaroid frame -->
  <rect x="10" y="6" width="44" height="52" rx="2" fill="#fffdf7" stroke="#7a5c43" stroke-width="2"/>
  <!-- Photo area -->
  <rect x="14" y="10" width="36" height="30" rx="1" fill="#e3d1b8" stroke="#b39b82" stroke-width="1"/>
  <!-- Simple portrait silhouette -->
  <circle cx="32" cy="22" r="8" fill="#d4a373" opacity="0.7"/>
  <ellipse cx="32" cy="38" rx="12" ry="6" fill="#d4a373" opacity="0.5"/>
  <!-- Heart -->
  <g transform="translate(36,44) scale(0.8)">
    <path d="M0,-4 C-2,-8 -8,-8 -8,-3 C-8,2 0,8 0,8 C0,8 8,2 8,-3 C8,-8 2,-8 0,-4Z" fill="#e07a5f"/>
  </g>
