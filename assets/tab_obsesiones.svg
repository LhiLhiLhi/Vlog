<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Retro TV body -->
  <rect x="8" y="10" width="48" height="38" rx="6" fill="#e3d1b8" stroke="#7a5c43" stroke-width="2"/>
  <!-- Screen -->
  <rect x="14" y="15" width="28" height="22" rx="3" fill="#3b2c20" stroke="#7a5c43" stroke-width="1.5"/>
  <!-- Star on screen -->
  <polygon points="28,20 30,26 36,26 31,30 33,36 28,32 23,36 25,30 20,26 26,26" fill="#f2cc8f"/>
  <!-- Knobs -->
  <circle cx="48" cy="22" r="3" fill="#d4a373" stroke="#7a5c43" stroke-width="1"/>
  <circle cx="48" cy="32" r="3" fill="#d4a373" stroke="#7a5c43" stroke-width="1"/>
  <!-- Antenna -->
  <line x1="22" y1="10" x2="16" y2="2" stroke="#7a5c43" stroke-width="2" stroke-linecap="round"/>
  <line x1="34" y1="10" x2="40" y2="2" stroke="#7a5c43" stroke-width="2" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="18" y1="48" x2="14" y2="58" stroke="#7a5c43" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="46" y1="48" x2="50" y2="58" stroke="#7a5c43" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Sparkles -->
  <text x="2" y="16" font-size="8" fill="#e07a5f">✦</text>
  <text x="54" y="52" font-size="8" fill="#e07a5f">✦</text>
</svg>
