<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Notebook -->
  <rect x="12" y="6" width="40" height="52" rx="2" fill="#fffdf7" stroke="#7a5c43" stroke-width="2"/>
  <!-- Spine/binding -->
  <rect x="12" y="6" width="6" height="52" rx="1" fill="#e07a5f" stroke="#7a5c43" stroke-width="1.5"/>
  <!-- Lines on page -->
  <line x1="22" y1="18" x2="46" y2="18" stroke="#a6b8c7" stroke-width="1" opacity="0.6"/>
  <line x1="22" y1="24" x2="46" y2="24" stroke="#a6b8c7" stroke-width="1" opacity="0.6"/>
  <line x1="22" y1="30" x2="46" y2="30" stroke="#a6b8c7" stroke-width="1" opacity="0.6"/>
  <line x1="22" y1="36" x2="46" y2="36" stroke="#a6b8c7" stroke-width="1" opacity="0.6"/>
  <line x1="22" y1="42" x2="46" y2="42" stroke="#a6b8c7" stroke-width="1" opacity="0.6"/>
  <line x1="22" y1="48" x2="46" y2="48" stroke="#a6b8c7" stroke-width="1" opacity="0.6"/>
  <!-- Pencil -->
  <g transform="translate(42,4) rotate(30)">
    <rect x="0" y="0" width="5" height="28" rx="1" fill="#f2cc8f" stroke="#7a5c43" stroke-width="1"/>
    <polygon points="0,28 5,28 2.5,34" fill="#d4a373" stroke="#7a5c43" stroke-width="0.8"/>
    <rect x="0" y="0" width="5" height="4" rx="1" fill="#e07a5f"/>
  </g>
  <!-- Sparkle -->
  <text x="4" y="14" font-size="9" fill="#f2cc8f">✧</text>
</svg>
