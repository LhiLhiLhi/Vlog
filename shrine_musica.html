<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>♫ Música | ANALHI</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="shrine.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Inter:wght@400;600;800&family=VT323&display=swap" rel="stylesheet">
</head>
<body>
    <a href="index.html" class="back-btn">← volver al inicio</a>

    <div class="shrine-container">
        <h1 class="shrine-title">♫ Música ♫</h1>
        <p class="shrine-subtitle handwritten-text">las canciones que me hacen sentir viva</p>

        <div class="shrine-grid">
            {% for artista in site.data.musica.artistas %}
            <div class="shrine-card">
                <div class="card-icon"><img src="assets/tab_musica.svg" alt="" class="shrine-card-icon"></div>
                <h2>{{ artista.nombre }}</h2>
                <p class="handwritten-text">{{ artista.descripcion }}</p>
                <div class="card-tags">
                    {% assign tags = artista.tags | split: ", " %}
                    {% for tag in tags %}<span>{{ tag }}</span>{% endfor %}
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
