items:
  - nombre: "Guardians of the Galaxy Vol. 3"
    descripcion: "La película que me hizo llorar como nunca. Rocket, Groot, Peter... esta familia disfuncional es todo. El soundtrack es perfección pura de los 70s y 80s."
    tags: "Marvel, Sci-Fi, Soundtrack"
  - nombre: "Hamilton"
    descripcion: "\"I am not throwing away my shot.\" Este musical me cambió la vida. La mezcla de hip-hop con historia es brillante. Alexander Hamilton es un ícono."
    tags: "Musical, Broadway, History"
  - nombre: "Greninja"
    descripcion: "El mejor Pokémon de todos los tiempos y no acepto debate. Su diseño, su battle bond con Ash, todo en él es perfecto. Greninja supremacy forever."
    tags: "Pokémon, XYZ, Best Boy"
  - nombre: "80s/90s Pop Culture"
    descripcion: "Desde los VHS hasta los walkmans, pasando por las sitcoms y el grunge. Todo de esas décadas me fascina. Nací en la época equivocada, pero vivo esa nostalgia a diario."
    tags: "Retro, Nostalgia, Vintage"
